<!DOCTYPE html>
<html>
<head>
    <title>College Timetable</title>

    <style>
        body {
            font-family: Arial;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        td {
            background-color: #f2f2f2;
        }

        .break {
            background-color: #ffcccb;
            font-weight: bold;
        }

    </style>

</head>

<body>

<h2>College Timetable</h2>

<table>

<tr>
    <th>Day / Time</th>
    <th>9 - 10</th>
    <th>10 - 11</th>
    <th>Break</th>
    <th>11:15 - 12:15</th>
    <th>12:15 - 1:15</th>
    <th>Break</th>
    <th>2 - 3</th>
    <th>3 - 4</th>
</tr>

<tr>
    <th>Monday</th>
    <td>WD</td>
    <td>WD</td>
    <td rowspan="5" class="break">Break</td>
    <td>AOOC</td>
    <td>MDM</td>
    <td rowspan="5" class="break">Break</td>
    <td>DSL</td>
    <td>-</td>
</tr>

<tr>
    <th>Tuesday</th>
    <td>TPMS</td>
    <td>TPMS</td>
    <td>AT</td>
    <td>DSL</td>
    <td>WD</td>
    <td>ENV</td>
</tr>

<tr>
    <th>Wednesday</th>
    <td>AOOC</td>
    <td>AOOC</td>
    <td>AOOC</td>
    <td>MDM</td>
    <td>DSL</td>
    <td>ENV</td>
</tr>

<tr>
    <th>Thursday</th>
    <td>DSL</td>
    <td>DSL</td>
    <td>AT</td>
    <td>AT</td>
    <td>-</td>
    <td>OEC</td>
</tr>

<tr>
    <th>Friday</th>
    <td>TTL</td>
    <td>TTL</td>
    <td>TTL</td>
    <td>TTL</td>
    <td>TPMS</td>
    <td>OEC</td>
</tr>

</table>

</body>
</html>
