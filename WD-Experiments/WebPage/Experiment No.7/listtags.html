<!DOCTYPE html>
<html>
<head>
    <title>Text and Image Link Practical</title>
</head>

<body>

<h2>Text Link Example</h2>

<!-- Text Link to College Website -->

    Visit COEK DY Patil College Website
</a>

<br><br>
<h2>Image Link Example</h2>

<!-- Image Link to College Website -->

         alt="College Image"
         width="200"
         height="150">
</a>
</body>
</html>
