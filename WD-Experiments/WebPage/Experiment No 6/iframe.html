<!DOCTYPE html>
<html>
<head>
    <title>iFrame Example</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
        }
        .menu {
            width: 30%;
            background: #f2f2f2;
            padding: 10px;
        }
        .content {
            width: 70%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

<div class="menu">
    <h2>Menu</h2>
    <ul>
        <li><a href="page1.html" target="contentFrame">Page 1</a></li>
        <li><a href="page2.html" target="contentFrame">Page 2</a></li>
    </ul>
</div>

<div class="content">
    <iframe name="contentFrame" src="content.html"></iframe>
</div>

</body>
</html>
